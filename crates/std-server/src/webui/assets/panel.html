<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ferro admin</title>
<style>
  :root { --bg:#0f1117; --card:#1a1d27; --fg:#e6e8ee; --muted:#9aa0ad; --accent:#4f8cff; --ok:#3ecf8e; --err:#ff6b6b; --border:#2a2e3a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--ok); }
  .langs { margin-left:auto; display:flex; gap:6px; }
  .langs button { background:transparent; border:1px solid var(--border); color:var(--muted); padding:4px 10px; border-radius:6px; font-size:13px; cursor:pointer; }
  .langs button.active { color:#fff; border-color:var(--accent); }
  main { max-width:880px; margin:0 auto; padding:20px; display:grid; gap:20px; grid-template-columns:1fr; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .card h2 { margin:0 0 14px; font-size:15px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); }
  .stat { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .stat .v { font-size:22px; font-weight:700; }
  .stat .k { font-size:12px; color:var(--muted); margin-top:2px; }
  textarea { width:100%; min-height:320px; resize:vertical; background:var(--bg); color:var(--fg); border:1px solid var(--border); border-radius:8px; padding:12px; font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .row { display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:9px 16px; font-size:14px; font-weight:600; cursor:pointer; }
  button.secondary { background:transparent; color:var(--fg); border:1px solid var(--border); }
  button:active { transform:translateY(1px); }
  #msg { font-size:13px; }
  #msg.ok { color:var(--ok); }
  #msg.err { color:var(--err); }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; padding:16px; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; width:100%; max-width:380px; }
  .modal h3 { margin:0 0 6px; font-size:16px; }
  .modal label { display:block; font-size:13px; color:var(--muted); margin:12px 0 4px; }
  .modal input { width:100%; background:var(--bg); color:var(--fg); border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:14px; }
  .modal .row { justify-content:flex-end; }
  #pw-msg { font-size:13px; margin-right:auto; color:var(--err); }
  @media (max-width:560px){ main{padding:14px;} .stat .v{font-size:19px;} }
</style>
</head>
<body>
<header>
  <span class="dot"></span><h1 data-i18n="app.title">ferro admin</h1>
  <div class="langs">
    <button data-lang="en" onclick="setLang('en')">EN</button>
    <button data-lang="tr" onclick="setLang('tr')">TR</button>
  </div>
</header>
<main>
  <section class="card">
    <h2 data-i18n="stats.title">Statistics</h2>
    <div class="grid" id="stats">
      <div class="stat"><div class="v" id="s-up">-</div><div class="k" data-i18n="stats.uptime">uptime (s)</div></div>
      <div class="stat"><div class="v" id="s-total">-</div><div class="k" data-i18n="stats.requests">requests</div></div>
      <div class="stat"><div class="v" id="s-2xx">-</div><div class="k" data-i18n="stats.2xx">2xx</div></div>
      <div class="stat"><div class="v" id="s-3xx">-</div><div class="k" data-i18n="stats.3xx">3xx</div></div>
      <div class="stat"><div class="v" id="s-4xx">-</div><div class="k" data-i18n="stats.4xx">4xx</div></div>
      <div class="stat"><div class="v" id="s-5xx">-</div><div class="k" data-i18n="stats.5xx">5xx</div></div>
      <div class="stat"><div class="v" id="s-bytes">-</div><div class="k" data-i18n="stats.bytes">bytes out</div></div>
    </div>
  </section>
  <section class="card">
    <h2 data-i18n="config.title">Configuration</h2>
    <textarea id="cfg" spellcheck="false" autocomplete="off"></textarea>
    <div class="row">
      <button id="save" data-i18n="config.save">Save &amp; apply</button>
      <button id="reload" class="secondary" data-i18n="config.reload">Reload from server</button>
      <button id="passwd" class="secondary" data-i18n="config.password">Change password</button>
      <span id="msg"></span>
    </div>
  </section>
</main>

<div class="modal-bg" id="pw-modal">
  <div class="modal">
    <h3 data-i18n="password.title">Change password</h3>
    <label data-i18n="password.current">Current password</label>
    <input type="password" id="pw-cur" autocomplete="current-password">
    <label data-i18n="password.new">New password</label>
    <input type="password" id="pw-new" autocomplete="new-password">
    <label data-i18n="password.confirm">Confirm new password</label>
    <input type="password" id="pw-conf" autocomplete="new-password">
    <div class="row">
      <span id="pw-msg"></span>
      <button id="pw-cancel" class="secondary" data-i18n="password.cancel">Cancel</button>
      <button id="pw-submit" data-i18n="password.submit">Change</button>
    </div>
  </div>
</div>
<script>
  var $ = function (id) { return document.getElementById(id); };
  var I18N = {};
  var lang = localStorage.getItem('lang') || (navigator.language && navigator.language.slice(0, 2) === 'tr' ? 'tr' : 'en');

  function t(key) { var d = I18N[lang] || {}; return d[key] || key; }
  function applyI18n() {
    var nodes = document.querySelectorAll('[data-i18n]');
    for (var i = 0; i < nodes.length; i++) { nodes[i].textContent = t(nodes[i].getAttribute('data-i18n')); }
    document.documentElement.lang = lang;
    document.title = t('app.title');
    var langs = document.querySelectorAll('[data-lang]');
    for (var j = 0; j < langs.length; j++) { langs[j].classList.toggle('active', langs[j].getAttribute('data-lang') === lang); }
  }
  function setLang(l) { lang = l; localStorage.setItem('lang', l); applyI18n(); }
  function loadI18n() {
    return fetch('/admin/api/i18n').then(function (r) { return r.json(); })
      .then(function (d) { I18N = d; applyI18n(); }).catch(function () {});
  }

  function setMsg(text, ok) { var m = $('msg'); m.textContent = text; m.className = ok ? 'ok' : 'err'; }

  function loadStats() {
    fetch('/admin/api/stats').then(function (r) { return r.json(); }).then(function (s) {
      $('s-up').textContent = s.uptime_secs;
      $('s-total').textContent = s.total_requests;
      $('s-2xx').textContent = s.status_2xx;
      $('s-3xx').textContent = s.status_3xx;
      $('s-4xx').textContent = s.status_4xx;
      $('s-5xx').textContent = s.status_5xx;
      $('s-bytes').textContent = s.bytes_out;
    }).catch(function () {});
  }

  function loadConfig() {
    fetch('/admin/api/config').then(function (r) { return r.text(); }).then(function (txt) {
      $('cfg').value = txt;
      setMsg(t('config.loaded'), true);
    }).catch(function () { setMsg(t('config.load_failed'), false); });
  }

  function saveConfig() {
    fetch('/admin/api/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: $('cfg').value })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
      .then(function (res) {
        if (!res.ok) { setMsg(t('config.error') + ' ' + (res.body.error || ''), false); return; }
        var note = t('config.applied');
        if (res.body.restart_required && res.body.restart_required.length) {
          note += ' ' + t('config.restart_required') + ' ' + res.body.restart_required.join(', ');
        }
        setMsg(note, true);
      })
      .catch(function () { setMsg(t('config.request_failed'), false); });
  }

  function setPwMsg(text) { $('pw-msg').textContent = text; }
  function openPw() { $('pw-cur').value = ''; $('pw-new').value = ''; $('pw-conf').value = ''; setPwMsg(''); $('pw-modal').classList.add('open'); }
  function closePw() { $('pw-modal').classList.remove('open'); }
  function submitPw() {
    var cur = $('pw-cur').value, nw = $('pw-new').value, cf = $('pw-conf').value;
    if (!nw) { setPwMsg(t('password.empty')); return; }
    if (nw !== cf) { setPwMsg(t('password.mismatch')); return; }
    fetch('/admin/api/password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ current_password: cur, new_password: nw }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
      .then(function (res) {
        if (!res.ok) { setPwMsg(t('password.failed') + ' ' + (res.body.error || '')); return; }
        closePw(); setMsg(t('password.changed'), true);
      })
      .catch(function () { setPwMsg(t('config.request_failed')); });
  }

  $('save').addEventListener('click', saveConfig);
  $('reload').addEventListener('click', loadConfig);
  $('passwd').addEventListener('click', openPw);
  $('pw-cancel').addEventListener('click', closePw);
  $('pw-submit').addEventListener('click', submitPw);
  loadI18n().then(function () { loadConfig(); });
  loadStats();
  setInterval(loadStats, 3000);
</script>
</body>
</html>
