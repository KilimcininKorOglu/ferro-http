name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Optional features baked into the released binaries. tls is left out because
  # rustls' ring backend needs a C toolchain that does not cross-compile cleanly
  # to every target; users who need TLS build with `--features tls` themselves.
  RELEASE_FEATURES: "gzip,webui"

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          # OpenWRT / embedded Linux arches, cross-compiled via `cross`.
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross
        if: matrix.cross
        run: |
          curl -sL https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv cross /usr/local/bin/
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p ferro --target ${{ matrix.target }} --features "${{ env.RELEASE_FEATURES }}"
      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p ferro --target ${{ matrix.target }} --features "${{ env.RELEASE_FEATURES }}"
      - name: Package
        shell: bash
        run: |
          staging="ferro-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$staging"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/ferro.exe" "$staging/"
          else
            cp "target/${{ matrix.target }}/release/ferro" "$staging/"
          fi
          cp README.md "$staging/" 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${staging}.zip" "$staging" >/dev/null
            echo "ASSET=${staging}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${staging}.tar.gz" "$staging"
            echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "ferro ${{ github.ref_name }}" \
            --generate-notes
